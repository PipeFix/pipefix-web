<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PipeFix CZ</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0b0f1a;
      color: #fff;
      line-height: 1.5;
    }
    main {
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 32px 16px;
      text-align: center;
    }
    h1 {
      margin: 0 0 12px;
      font-size: clamp(30px, 6vw, 52px);
    }
    p {
      margin: 0 0 20px;
      color: #c7d5e5;
      font-size: clamp(16px, 3vw, 20px);
    }
    .cta {
      display: inline-block;
      padding: 14px 24px;
      border-radius: 8px;
      background: #1da1f2;
      color: #fff;
      text-decoration: none;
      font-weight: 700;
    }
    .contact {
      margin-top: 26px;
      font-size: 15px;
      color: #d6e6f8;
    }
    .contact a {
      color: #d6e6f8;
      text-decoration: none;
      display: block;
      margin-top: 6px;
    }
  </style>
</head>
<body>
  <main>
    <section>
      <h1>Oprava kanalizace bez výkopu</h1>
      <p>Jednoduchá verze stránky připravená pro nové obsahy.</p>
      <a class="cta" href="tel:+420724340955">📞 Zavolat: +420 724 340 955</a>
      <div class="contact">
        <a href="mailto:info@pipefix.cz">✉️ info@pipefix.cz</a>
      </div>
    </section>
  </main>
</body>
</html>
