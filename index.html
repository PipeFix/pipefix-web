<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PipeFix CZ | Kde působíme</title>
  <style>
    :root {
      --bg: #0b0f1a;
      --surface: #111827;
      --surface-2: #172033;
      --text: #f4f7fb;
      --muted: #9eb1c7;
      --accent: #1da1f2;
      --stroke: #26364f;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: "Montserrat", "Segoe UI", system-ui, sans-serif;
      color: var(--text);
      background: radial-gradient(circle at top, #121b2d, var(--bg) 45%);
    }

    main {
      width: min(1120px, 100% - 2rem);
      margin: 0 auto;
      padding: 3rem 0 4rem;
    }

    h1 {
      margin: 0;
      font-size: clamp(2rem, 4vw, 3rem);
    }

    .sub {
      color: var(--muted);
      margin: 0.75rem 0 0;
      max-width: 70ch;
      line-height: 1.55;
    }

    #regions {
      margin-top: 2rem;
      background: color-mix(in oklab, var(--surface), black 8%);
      border: 1px solid #1f2e46;
      border-radius: 16px;
      padding: clamp(1rem, 3vw, 2rem);
    }

    .regions-layout {
      display: grid;
      gap: 1.2rem;
      grid-template-columns: minmax(320px, 1.15fr) minmax(260px, 1fr);
      align-items: start;
    }

    .map-wrap {
      min-height: 460px;
      display: grid;
      align-items: center;
      background: var(--surface);
      border: 1px solid var(--stroke);
      border-radius: 12px;
      padding: 0.75rem;
    }

    .map-wrap svg {
      width: 100%;
      height: auto;
      max-height: 620px;
      display: block;
    }

    .region-list {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
      gap: 0.65rem;
      align-content: start;
    }

    .region-chip {
      border: 1px solid #2d415f;
      border-radius: 10px;
      background: var(--surface-2);
      color: var(--text);
      min-height: 44px;
      padding: 0.55rem 0.75rem;
      text-align: left;
      cursor: pointer;
      transition: 0.18s ease;
      font: inherit;
      font-size: 0.95rem;
    }

    .region-chip:hover,
    .region-chip:focus-visible,
    .region-chip.is-active {
      border-color: var(--accent);
      box-shadow: 0 0 0 2px color-mix(in oklab, var(--accent), transparent 75%);
      background: color-mix(in oklab, var(--surface-2), var(--accent) 14%);
      outline: none;
    }

    .map-region {
      fill: #2d4363;
      stroke: #9bb3ce;
      stroke-width: 1.5;
      transition: 0.15s ease;
      cursor: pointer;
    }

    .map-region:hover,
    .map-region:focus-visible,
    .map-region.is-active {
      fill: var(--accent) !important;
      stroke: #f2f8ff;
      stroke-width: 2.2;
      filter: drop-shadow(0 4px 8px rgba(29,161,242,0.35));
      outline: none;
    }

    .status {
      color: var(--muted);
      margin-top: 0.6rem;
      font-size: 0.95rem;
    }

    @media (max-width: 920px) {
      .regions-layout {
        grid-template-columns: 1fr;
      }

      .map-wrap {
        min-height: 360px;
      }
    }
  </style>
</head>
<body>
  <main>
    <h1>Kde působíme</h1>
    <p class="sub">Interaktivní mapa krajů ČR je načtená ze zdrojového souboru <code>cz.svg</code> a vložená jako inline SVG, aby šlo propojit zvýraznění mezi mapou a seznamem krajů.</p>

    <section id="regions" aria-labelledby="regions-heading">
      <h2 id="regions-heading">Kraje, kde realizujeme zakázky</h2>
      <div class="regions-layout">
        <div>
          <div id="mapWrap" class="map-wrap" aria-live="polite"></div>
          <p class="status" id="mapStatus">Načítám mapu krajů…</p>
        </div>
        <div class="region-list" id="regionList" aria-label="Seznam krajů"></div>
      </div>
    </section>
  </main>

  <script>
    const SVG_URL = 'https://raw.githubusercontent.com/PipeFix/pipefix-web/refs/heads/main/cz.svg';

    const mapWrap = document.getElementById('mapWrap');
    const mapStatus = document.getElementById('mapStatus');
    const regionList = document.getElementById('regionList');

    const formatName = (raw) => raw
      .replace(/[_-]+/g, ' ')
      .replace(/\s+/g, ' ')
      .trim();

    const setActive = (id, active) => {
      const region = mapWrap.querySelector(`[id="${CSS.escape(id)}"]`);
      const chip = regionList.querySelector(`[data-region="${CSS.escape(id)}"]`);
      if (region) region.classList.toggle('is-active', active);
      if (chip) chip.classList.toggle('is-active', active);
    };

    const bindInteractivePair = (id, region, chip) => {
      const activate = () => setActive(id, true);
      const deactivate = () => setActive(id, false);

      for (const el of [region, chip]) {
        el.addEventListener('mouseenter', activate);
        el.addEventListener('mouseleave', deactivate);
        el.addEventListener('focus', activate);
        el.addEventListener('blur', deactivate);
      }
    };

    const initMap = async () => {
      try {
        const res = await fetch(SVG_URL, { cache: 'no-store' });
        if (!res.ok) throw new Error(`HTTP ${res.status}`);

        const svgText = await res.text();
        mapWrap.innerHTML = svgText;
        const svg = mapWrap.querySelector('svg');

        if (!svg) throw new Error('SVG se nepodařilo vložit inline.');

        svg.setAttribute('role', 'img');
        svg.setAttribute('aria-label', 'Mapa krajů České republiky');

        const regions = [...svg.querySelectorAll('[id]')]
          .filter((node) => /^(path|polygon|g)$/i.test(node.tagName));

        if (!regions.length) {
          throw new Error('Ve vloženém SVG nebyly nalezené regiony s atributem id.');
        }

        const uniqueById = new Map();
        for (const node of regions) {
          if (!uniqueById.has(node.id)) uniqueById.set(node.id, node);
        }

        const prepared = [...uniqueById.values()].map((region) => {
          region.classList.add('map-region');
          region.setAttribute('tabindex', '0');

          const sourceName = region.getAttribute('name') || region.id;
          const label = formatName(sourceName);

          const chip = document.createElement('button');
          chip.type = 'button';
          chip.className = 'region-chip';
          chip.dataset.region = region.id;
          chip.textContent = label;
          chip.setAttribute('aria-label', `Kraj: ${label}`);

          regionList.appendChild(chip);
          bindInteractivePair(region.id, region, chip);

          return label;
        });

        mapStatus.textContent = `Mapa načtena. Aktivních krajů: ${prepared.length}.`;
      } catch (err) {
        mapStatus.textContent = 'Mapu se nepodařilo načíst. Zkontrolujte dostupnost souboru cz.svg.';
        console.error(err);
      }
    };

    initMap();
  </script>
</body>
</html>
