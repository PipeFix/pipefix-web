<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PipeFix CZ | Kde působíme</title>
  <style>
    :root {
      --bg: #0b0f1a;
      --surface: #111827;
      --text: #f7fbff;
      --muted: #adc1da;
      --accent: #27b2ff;
      --accent-soft: rgba(39, 178, 255, 0.25);
      --stroke: #29405d;
      --card-h: 78px;
      --panel-h: clamp(420px, 48vw, 500px);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Montserrat", "Segoe UI", system-ui, sans-serif;
      color: var(--text);
      background: radial-gradient(1000px 600px at 50% -100px, #1a2940, #0b0f1a 60%);
    }
    main {
      width: min(1120px, calc(100% - 1.5rem));
      margin: 0 auto;
      padding: clamp(1.2rem, 3vw, 2rem) 0 2.5rem;
    }
    h1 { margin: 0; font-size: clamp(2rem, 4vw, 2.7rem); }
    .sub {
      margin: 0.65rem 0 0;
      color: var(--muted);
      max-width: 70ch;
      line-height: 1.55;
      font-size: clamp(0.98rem, 1.2vw, 1.08rem);
    }
    #regions {
      margin-top: 1.2rem;
      background: linear-gradient(180deg, #121d2f 0%, #101a2b 100%);
      border: 1px solid #223852;
      border-radius: 16px;
      padding: clamp(0.8rem, 2vw, 1.2rem);
      box-shadow: 0 16px 32px rgba(0,0,0,0.3);
    }
    #regions h2 { margin: 0 0 0.7rem; font-size: clamp(1.18rem, 1.8vw, 1.45rem); }
    .regions-layout {
      display: grid;
      grid-template-columns: minmax(130px, 0.65fr) minmax(360px, 1.7fr) minmax(130px, 0.65fr);
      gap: 0.7rem;
      align-items: stretch;
    }
    .panel {
      height: var(--panel-h);
      border: 1px solid var(--stroke);
      border-radius: 12px;
      background: var(--surface);
      padding: 0.6rem;
      overflow: hidden;
    }
    .side-panel { display: flex; justify-content: center; }
    .region-list {
      width: min(170px, 100%);
      display: grid;
      grid-template-rows: repeat(4, minmax(var(--card-h), 1fr));
      gap: 0.55rem;
    }
    .map-panel {
      display: grid;
      place-items: center;
      background: radial-gradient(circle at 50% 45%, #1c2b43 0%, #131f32 65%, #111827 100%);
      padding: 0.35rem;
    }
    .map-wrap {
      width: 100%;
      height: 100%;
      display: grid;
      place-items: center;
    }
    .map-wrap svg {
      width: 100%;
      height: 100%;
      max-width: 100%;
      max-height: 100%;
      display: block;
    }
    .region-chip {
      border: 1px solid #3f5f89;
      border-radius: 12px;
      background: linear-gradient(180deg, #1b2b43 0%, #16243a 100%);
      color: var(--text);
      font: 700 clamp(1.55rem, 2.4vw, 2rem) / 1.05 inherit;
      letter-spacing: 0.01em;
      width: 100%;
      min-height: var(--card-h);
      padding: 0.5rem 0.6rem;
      text-align: left;
      cursor: pointer;
      transition: transform .14s ease, border-color .14s ease, box-shadow .14s ease, background .14s ease;
    }
    .region-chip:hover,
    .region-chip:focus-visible,
    .region-chip.is-active {
      transform: translateY(-1px);
      border-color: #7ad3ff;
      background: linear-gradient(180deg, #213754 0%, #1a2d47 100%);
      box-shadow: 0 0 0 2px var(--accent-soft), 0 8px 16px rgba(0,0,0,0.23);
      outline: none;
    }
    .map-region {
      fill: #1f2b3f;
      stroke: #3d5374;
      stroke-width: 1.1;
      opacity: .6;
      transition: fill .14s ease, stroke .14s ease, filter .14s ease, opacity .14s ease;
      pointer-events: none;
    }
    .map-region.service-region {
      fill: #2d4262;
      stroke: #9bb9d8;
      opacity: 1;
      pointer-events: auto;
      cursor: pointer;
    }
    .map-region.service-region:hover,
    .map-region.service-region:focus-visible,
    .map-region.service-region.is-active {
      fill: var(--accent) !important;
      stroke: #f3f9ff;
      stroke-width: 1.8;
      filter: drop-shadow(0 3px 7px rgba(39,178,255,.45));
      outline: none;
    }
    .map-fallback {
      margin: 0;
      color: var(--muted);
      text-align: center;
      padding: 1rem;
    }
    @media (max-width: 1040px) {
      :root { --panel-h: clamp(380px, 92vw, 560px); --card-h: 74px; }
      .regions-layout { grid-template-columns: 1fr; }
      .side-panel, .map-panel { height: auto; }
      .region-list {
        width: 100%;
        grid-template-columns: repeat(2, minmax(140px, 1fr));
        grid-template-rows: auto;
      }
      .region-chip { font-size: clamp(1.15rem, 5.2vw, 1.55rem); }
    }
  </style>
</head>
<body>
  <main>
    <h1>Kde působíme</h1>
    <p class="sub">Působíme ve vybraných krajích a zakázky realizujeme bez zbytečných výkopů a bourání.</p>

    <section id="regions" aria-labelledby="regions-heading">
      <h2 id="regions-heading">Kraje, kde realizujeme zakázky</h2>
      <div class="regions-layout">
        <aside class="panel side-panel" aria-label="Kraje vlevo"><div class="region-list" id="leftRegionList"></div></aside>
        <div class="panel map-panel"><div class="map-wrap" id="mapWrap"></div></div>
        <aside class="panel side-panel" aria-label="Kraje vpravo"><div class="region-list" id="rightRegionList"></div></aside>
      </div>
    </section>
  </main>

  <script>
    const SVG_URLS = [
      './cz.svg',
      'https://cdn.jsdelivr.net/gh/PipeFix/pipefix-web@main/cz.svg',
      'https://raw.githubusercontent.com/PipeFix/pipefix-web/main/cz.svg',
      'https://raw.githubusercontent.com/PipeFix/pipefix-web/refs/heads/main/cz.svg'
    ];
    const leftRegionList = document.getElementById('leftRegionList');
    const rightRegionList = document.getElementById('rightRegionList');
    const mapWrap = document.getElementById('mapWrap');

    const SERVICE_REGIONS = [
      { key: 'praha', label: 'Praha', side: 'left', aliases: ['praha', 'hlavni mesto praha', 'hl_m_praha'] },
      { key: 'stredocesky', label: 'Středočeský kraj', side: 'left', aliases: ['stredocesky kraj', 'stredocesky', 'stredni cechy'] },
      { key: 'jihocesky', label: 'Jihočeský kraj', side: 'left', aliases: ['jihocesky kraj', 'jihocesky'] },
      { key: 'vysocina', label: 'Kraj Vysočina', side: 'left', aliases: ['kraj vysocina', 'vysocina'] },
      { key: 'jihomoravsky', label: 'Jihomoravský kraj', side: 'right', aliases: ['jihomoravsky kraj', 'jihomoravsky'] },
      { key: 'olomoucky', label: 'Olomoucký kraj', side: 'right', aliases: ['olomoucky kraj', 'olomoucky'] },
      { key: 'zlinsky', label: 'Zlínský kraj', side: 'right', aliases: ['zlinsky kraj', 'zlinsky'] },
      { key: 'pardubicky', label: 'Pardubický kraj', side: 'right', aliases: ['pardubicky kraj', 'pardubicky'] }
    ];
    const TECHNICAL_IDS = new Set(['features', 'points', 'label points', 'label-points', 'labels', 'labelpoints']);
    const chipByKey = new Map();
    const mapRegionsByKey = new Map();

    const normalize = (value) => (value || '')
      .toString()
      .normalize('NFD')
      .replace(/[\u0300-\u036f]/g, '')
      .replace(/[_-]+/g, ' ')
      .replace(/\s+/g, ' ')
      .trim()
      .toLowerCase();

    const setActiveByKey = (key, active) => {
      chipByKey.get(key)?.classList.toggle('is-active', active);
      for (const el of (mapRegionsByKey.get(key) || [])) el.classList.toggle('is-active', active);
    };

    const bindPair = (key, chip, mapNodes) => {
      const activate = () => setActiveByKey(key, true);
      const deactivate = () => setActiveByKey(key, false);
      const toggle = () => setActiveByKey(key, !chip.classList.contains('is-active'));
      for (const el of [chip, ...mapNodes]) {
        el.addEventListener('mouseenter', activate);
        el.addEventListener('mouseleave', deactivate);
        el.addEventListener('focus', activate);
        el.addEventListener('blur', deactivate);
        el.addEventListener('click', toggle);
      }
    };

    const buildRegionLists = () => {
      for (const region of SERVICE_REGIONS) {
        const chip = document.createElement('button');
        chip.type = 'button';
        chip.className = 'region-chip';
        chip.textContent = region.label;
        chipByKey.set(region.key, chip);
        (region.side === 'left' ? leftRegionList : rightRegionList).appendChild(chip);
      }
    };

    const resolveServiceRegion = (node) => {
      const anchor = node.closest('[id],[name]') || node;
      const candidates = [
        node.id,
        node.getAttribute('name'),
        anchor.id,
        anchor.getAttribute && anchor.getAttribute('name'),
        anchor.getAttribute && anchor.getAttribute('inkscape:label'),
        node.getAttribute('inkscape:label')
      ].map(normalize).filter(Boolean);

      return SERVICE_REGIONS.find((service) => candidates.some((candidate) => service.aliases.some((alias) => candidate.includes(normalize(alias)))));
    };

    const hideTechnicalLayers = (svg) => {
      for (const node of svg.querySelectorAll('[id]')) {
        if (TECHNICAL_IDS.has(normalize(node.id))) node.style.display = 'none';
      }
    };

    const fetchSvgText = async () => {
      for (const url of SVG_URLS) {
        try {
          const res = await fetch(url, { cache: 'no-store' });
          if (res.ok) return res.text();
        } catch (_) {}
      }
      throw new Error('Map unavailable');
    };

    const normalizeSvgViewport = (svg) => {
      svg.removeAttribute('width');
      svg.removeAttribute('height');
      if (!svg.getAttribute('viewBox')) {
        const w = Number(svg.getAttribute('width')) || 1000;
        const h = Number(svg.getAttribute('height')) || 700;
        svg.setAttribute('viewBox', `0 0 ${w} ${h}`);
      }
      svg.setAttribute('preserveAspectRatio', 'xMidYMid meet');
    };

    const initMap = async () => {
      buildRegionLists();
      try {
        const svgText = await fetchSvgText();
        mapWrap.innerHTML = svgText;
        const svg = mapWrap.querySelector('svg');
        if (!svg) throw new Error('bad svg');
        normalizeSvgViewport(svg);
        hideTechnicalLayers(svg);

        const shapes = [...svg.querySelectorAll('path, polygon')];
        shapes.forEach((s) => s.classList.add('map-region'));

        for (const shape of shapes) {
          const matched = resolveServiceRegion(shape);
          if (!matched) continue;
          shape.classList.add('service-region');
          shape.setAttribute('tabindex', '0');
          if (!mapRegionsByKey.has(matched.key)) mapRegionsByKey.set(matched.key, []);
          mapRegionsByKey.get(matched.key).push(shape);
        }

        for (const region of SERVICE_REGIONS) {
          const chip = chipByKey.get(region.key);
          const nodes = mapRegionsByKey.get(region.key) || [];
          if (chip && nodes.length) bindPair(region.key, chip, nodes);
        }
      } catch (_) {
        mapWrap.innerHTML = '<p class="map-fallback">Mapa je dočasně nedostupná. Zkuste prosím stránku znovu načíst.</p>';
      }
    };

    initMap();
  </script>
</body>
</html>
