<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PipeFix CZ | Kde působíme</title>
  <style>
    :root {
      --bg: #0b0f1a;
      --surface: #111827;
      --surface-2: #172033;
      --text: #f4f7fb;
      --muted: #9eb1c7;
      --accent: #1da1f2;
      --stroke: #26364f;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: "Montserrat", "Segoe UI", system-ui, sans-serif;
      color: var(--text);
      background: radial-gradient(circle at top, #121b2d, var(--bg) 45%);
    }

    main {
      width: min(1200px, 100% - 2rem);
      margin: 0 auto;
      padding: 3rem 0 4rem;
    }

    h1 {
      margin: 0;
      font-size: clamp(2rem, 4vw, 3rem);
    }

    .sub {
      color: var(--muted);
      margin: 0.75rem 0 0;
      max-width: 78ch;
      line-height: 1.55;
    }

    #regions {
      margin-top: 2rem;
      background: color-mix(in oklab, var(--surface), black 8%);
      border: 1px solid #1f2e46;
      border-radius: 16px;
      padding: clamp(1rem, 3vw, 2rem);
    }

    .regions-layout {
      display: grid;
      gap: 1rem;
      grid-template-columns: minmax(220px, 1fr) minmax(380px, 1.35fr) minmax(220px, 1fr);
      align-items: stretch;
    }

    .side-column,
    .map-column {
      min-height: 560px;
      border: 1px solid var(--stroke);
      border-radius: 12px;
      background: var(--surface);
      padding: 0.9rem;
    }

    .side-column {
      display: flex;
      align-items: center;
    }

    .region-list {
      width: 100%;
      display: grid;
      grid-template-columns: 1fr;
      gap: 0.7rem;
    }

    .map-column {
      display: grid;
      align-items: center;
    }

    .map-wrap svg {
      width: 100%;
      height: auto;
      max-height: 640px;
      display: block;
    }

    .region-chip {
      border: 1px solid #2d415f;
      border-radius: 10px;
      background: var(--surface-2);
      color: var(--text);
      min-height: 48px;
      padding: 0.6rem 0.8rem;
      text-align: left;
      cursor: pointer;
      transition: 0.18s ease;
      font: inherit;
      font-size: 1rem;
    }

    .region-chip:hover,
    .region-chip:focus-visible,
    .region-chip.is-active {
      border-color: var(--accent);
      box-shadow: 0 0 0 2px color-mix(in oklab, var(--accent), transparent 75%);
      background: color-mix(in oklab, var(--surface-2), var(--accent) 14%);
      outline: none;
    }

    .region-chip.is-disabled {
      opacity: 0.45;
      cursor: not-allowed;
      pointer-events: none;
    }

    .map-region {
      fill: #2d4363;
      stroke: #9bb3ce;
      stroke-width: 1.5;
      transition: 0.15s ease;
    }

    .map-region.service-region {
      cursor: pointer;
    }

    .map-region.service-region:hover,
    .map-region.service-region:focus-visible,
    .map-region.service-region.is-active {
      fill: var(--accent) !important;
      stroke: #f2f8ff;
      stroke-width: 2.2;
      filter: drop-shadow(0 4px 8px rgba(29, 161, 242, 0.35));
      outline: none;
    }

    .map-region.is-muted {
      fill: #202b3d !important;
      stroke: #3a4b67;
      opacity: 0.55;
      pointer-events: none;
    }

    .status {
      color: var(--muted);
      margin-top: 0.7rem;
      font-size: 0.95rem;
    }

    @media (max-width: 980px) {
      .regions-layout {
        grid-template-columns: 1fr;
      }

      .side-column,
      .map-column {
        min-height: auto;
      }

      .side-column {
        align-items: stretch;
      }

      .region-list {
        grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      }
    }
  </style>
</head>
<body>
  <main>
    <h1>Kde působíme</h1>
    <p class="sub">Působíme pouze ve vybraných krajích. Mapa používá reálnou geometrii z dodaného <code>cz.svg</code> a zvýraznění je propojené jen pro obsluhovaných 8 krajů.</p>

    <section id="regions" aria-labelledby="regions-heading">
      <h2 id="regions-heading">Kraje, kde realizujeme zakázky</h2>
      <div class="regions-layout">
        <aside class="side-column" aria-label="Kraje vlevo">
          <div class="region-list" id="leftRegionList"></div>
        </aside>

        <div>
          <div class="map-column">
            <div id="mapWrap" class="map-wrap" aria-live="polite"></div>
          </div>
          <p class="status" id="mapStatus">Načítám mapu krajů…</p>
        </div>

        <aside class="side-column" aria-label="Kraje vpravo">
          <div class="region-list" id="rightRegionList"></div>
        </aside>
      </div>
    </section>
  </main>

  <script>
    const SVG_URL = 'https://raw.githubusercontent.com/PipeFix/pipefix-web/refs/heads/main/cz.svg';

    const leftRegionList = document.getElementById('leftRegionList');
    const rightRegionList = document.getElementById('rightRegionList');
    const mapWrap = document.getElementById('mapWrap');
    const mapStatus = document.getElementById('mapStatus');

    const SERVICE_REGIONS = [
      { key: 'praha', label: 'Praha', side: 'left', aliases: ['praha', 'hlavni mesto praha', 'hl_m_praha'] },
      { key: 'stredocesky', label: 'Středočeský kraj', side: 'left', aliases: ['stredocesky kraj', 'stredocesky', 'stredni cechy'] },
      { key: 'jihocesky', label: 'Jihočeský kraj', side: 'left', aliases: ['jihocesky kraj', 'jihocesky'] },
      { key: 'vysocina', label: 'Kraj Vysočina', side: 'left', aliases: ['kraj vysocina', 'vysocina'] },
      { key: 'jihomoravsky', label: 'Jihomoravský kraj', side: 'right', aliases: ['jihomoravsky kraj', 'jihomoravsky'] },
      { key: 'olomoucky', label: 'Olomoucký kraj', side: 'right', aliases: ['olomoucky kraj', 'olomoucky'] },
      { key: 'zlinsky', label: 'Zlínský kraj', side: 'right', aliases: ['zlinsky kraj', 'zlinsky'] },
      { key: 'pardubicky', label: 'Pardubický kraj', side: 'right', aliases: ['pardubicky kraj', 'pardubicky'] }
    ];

    const TECHNICAL_IDS = new Set(['features', 'points', 'label points', 'label-points', 'labels', 'labelpoints']);

    const chipByKey = new Map();
    const mapRegionByKey = new Map();

    const normalize = (value) => (value || '')
      .toString()
      .normalize('NFD')
      .replace(/[\u0300-\u036f]/g, '')
      .replace(/[_-]+/g, ' ')
      .replace(/\s+/g, ' ')
      .trim()
      .toLowerCase();

    const setActiveByKey = (key, active) => {
      const chip = chipByKey.get(key);
      const region = mapRegionByKey.get(key);
      if (chip) chip.classList.toggle('is-active', active);
      if (region) region.classList.toggle('is-active', active);
    };

    const bindPair = (key, chip, region) => {
      const activate = () => setActiveByKey(key, true);
      const deactivate = () => setActiveByKey(key, false);
      for (const el of [chip, region]) {
        el.addEventListener('mouseenter', activate);
        el.addEventListener('mouseleave', deactivate);
        el.addEventListener('focus', activate);
        el.addEventListener('blur', deactivate);
      }
    };

    const buildRegionLists = () => {
      for (const region of SERVICE_REGIONS) {
        const chip = document.createElement('button');
        chip.type = 'button';
        chip.className = 'region-chip';
        chip.dataset.regionKey = region.key;
        chip.textContent = region.label;
        chip.setAttribute('aria-label', `Kraj: ${region.label}`);
        chipByKey.set(region.key, chip);

        if (region.side === 'left') {
          leftRegionList.appendChild(chip);
        } else {
          rightRegionList.appendChild(chip);
        }
      }
    };

    const resolveServiceRegion = (node) => {
      const candidates = [
        node.id,
        node.getAttribute('name'),
        node.getAttribute('inkscape:label'),
        node.getAttribute('aria-label')
      ].map(normalize).filter(Boolean);

      return SERVICE_REGIONS.find((service) =>
        candidates.some((candidate) =>
          service.aliases.some((alias) => candidate.includes(normalize(alias)))
        )
      );
    };

    const hideTechnicalLayers = (svg) => {
      for (const node of svg.querySelectorAll('[id]')) {
        if (TECHNICAL_IDS.has(normalize(node.id))) {
          node.style.display = 'none';
        }
      }
    };

    const initMap = async () => {
      buildRegionLists();

      try {
        const res = await fetch(SVG_URL, { cache: 'no-store' });
        if (!res.ok) throw new Error(`HTTP ${res.status}`);

        const svgText = await res.text();
        mapWrap.innerHTML = svgText;
        const svg = mapWrap.querySelector('svg');
        if (!svg) throw new Error('SVG se nepodařilo vložit inline.');

        svg.setAttribute('role', 'img');
        svg.setAttribute('aria-label', 'Mapa krajů České republiky');

        hideTechnicalLayers(svg);

        const nodes = [...svg.querySelectorAll('[id]')]
          .filter((node) => /^(path|polygon|g)$/i.test(node.tagName));

        for (const node of nodes) {
          node.classList.add('map-region');
          const matched = resolveServiceRegion(node);
          if (!matched || mapRegionByKey.has(matched.key)) {
            node.classList.add('is-muted');
            continue;
          }

          node.classList.add('service-region');
          node.setAttribute('tabindex', '0');
          mapRegionByKey.set(matched.key, node);

          const chip = chipByKey.get(matched.key);
          if (chip) bindPair(matched.key, chip, node);
        }

        for (const service of SERVICE_REGIONS) {
          const chip = chipByKey.get(service.key);
          if (!mapRegionByKey.has(service.key) && chip) {
            chip.classList.add('is-disabled');
            chip.title = 'Region se ve zdrojovém SVG nepodařilo spárovat podle id/name.';
          }
        }

        mapStatus.textContent = `Mapa načtena. Aktivní jsou pouze vybrané kraje (${mapRegionByKey.size}/8).`;
      } catch (err) {
        mapStatus.textContent = 'Mapu se nepodařilo načíst. Zkontrolujte dostupnost souboru cz.svg.';
        console.error(err);
      }
    };

    initMap();
  </script>
</body>
</html>
