<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 280" role="img" aria-labelledby="title desc">
  <title id="title">PipeFix logo</title>
  <desc id="desc">PipeFix banner logo with subtitle OPRAVA KANALIZACE BEZ KOPÁNÍ.</desc>

  <defs>
    <linearGradient id="outerStroke" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a2d62"/>
      <stop offset="50%" stop-color="#144b92"/>
      <stop offset="100%" stop-color="#0a2d62"/>
    </linearGradient>

    <linearGradient id="bannerFill" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0b1534"/>
      <stop offset="48%" stop-color="#142a64"/>
      <stop offset="100%" stop-color="#122453"/>
    </linearGradient>

    <linearGradient id="pipefixText" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#f8fbff"/>
      <stop offset="45%" stop-color="#eef6ff"/>
      <stop offset="60%" stop-color="#22b8ff"/>
      <stop offset="100%" stop-color="#1f75ff"/>
    </linearGradient>

    <filter id="shadow" x="-10%" y="-20%" width="130%" height="160%">
      <feDropShadow dx="0" dy="6" stdDeviation="6" flood-color="#010716" flood-opacity="0.55"/>
    </filter>
  </defs>

  <g transform="translate(40 28)" filter="url(#shadow)">
    <path d="M48 30 L734 30 L690 186 L24 186 L60 118 L24 50 Z" fill="url(#outerStroke)"/>
    <path d="M67 44 L710 44 L676 172 L53 172 L79 119 L53 64 Z" fill="url(#bannerFill)"/>
    <path d="M68 48 L708 48 L700 74 L72 74 Z" fill="#1ec6ff" opacity="0.72"/>

    <g transform="translate(88 42) skewX(-14)">
      <text x="0" y="92" font-family="Montserrat, Arial, sans-serif" font-size="116" font-weight="800" fill="url(#pipefixText)" letter-spacing="2">PIPEFIX</text>
      <text x="12" y="145" font-family="Montserrat, Arial, sans-serif" font-size="40" font-weight="700" fill="#f0f5ff" letter-spacing="1.5">OPRAVA KANALIZACE BEZ KOPÁNÍ</text>
    </g>
  </g>
</svg>
